<head>
  <meta charset="UTF-8" />

  <title>لغو رزرو</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../../public/brand/inbox-logo-mark.svg" alt="" />
        <h1>پنل مالک باشگاه</h1>
        <p>inbox — نمونه HTML</p>
      </div>
      <nav>
        <ul class="nav">
          <li><a href="index.html">تقویم امروز</a></li>
          <li><a href="calendar-actions.html">عملیات اسلات</a></li>
          <li><a href="finance.html">مالی</a></li>
          <li><a href="equipments.html">تجهیزات</a></li>
          <li><a href="package-creator.html">ساخت پکیج</a></li>
          <li><a href="crm.html">CRM</a></li>
          <li><a href="season-reserve.html">رزرو فصل</a></li>
          <li><a href="package-reserve.html">رزرو پکیج</a></li>
          <li><a href="cancelling.html" class="active">لغو رزرو</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main">
      <header class="page-header">
        <div>
          <span class="badge">Shape 5</span>
          <h2>Cancelling popup</h2>
          <p class="sub">from ②-① to ⑤-① — calendar popup flow</p>
        </div>
      </header>

      <div class="form-panel card" style="max-width:400px">
        <h3>لغو رزرو</h3>
        <div class="field">
          <label>name</label>
          <input type="text" value="علی" readonly />
          <small style="color:var(--muted);font-size:0.7rem">filled before</small>
        </div>
        <div class="field">
          <label>family</label>
          <input type="text" value="رضایی" readonly />
          <small style="color:var(--muted);font-size:0.7rem">filled before</small>
        </div>
        <div class="field">
          <label>number</label>
          <input type="text" value="۰۹۱۲۱۲۳۴۵۶۷" readonly />
          <small style="color:var(--muted);font-size:0.7rem">filled before</small>
        </div>
        <div class="field">
          <label>select</label>
          <select disabled>
            <option>دلیل لغو — انتخاب کنید</option>
            <option>درخواست مشتری</option>
            <option>عدم پرداخت</option>
            <option>تداخل برنامه</option>
          </select>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary">cancel</button>
          <button type="button" class="btn btn-ghost">back</button>
        </div>
      </div>
    </main>
  </div>
  <div class="screen-label">⑤ Cancelling</div>
</body>
</html>
